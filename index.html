/* ===== CONSTANTS ===== */
var SRC_COLORS={Facebook:"#1877F2",Google:"#EA4335"};
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ===== HELPERS ===== */
function cleanPhone(r){var d=r.replace(/\D/g,"");if(d.length===11&&d[0]==="1")d=d.substring(1);return d.length>=10?d.substring(0,10):d;}
function fmtPhone(p){var d=p.replace(/\D/g,"");if(d.length===10)return"("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);if(d.length===11)return"("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);return p;}
function toDS(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function daysLeft(ed,cap){var s=new Date(ed);s.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return cap-Math.floor((t-s)/864e5);}
function escA(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;");}
function fmt12(t){if(!t)return"";var p=t.split(":");var h=parseInt(p[0]),m=p[1];var ampm=h>=12?"PM":"AM";h=h%12;if(h===0)h=12;return h+":"+m+" "+ampm;}
function getFirstName(n){return n.trim().split(/\s+/)[0];}
function applyName(t,n){return t.replace(/\bname\b/gi,getFirstName(n));}
function isPhoneH(h){var l=h.toLowerCase().trim();for(var i=0;i<PHONE_KW.length;i++)if(l.indexOf(PHONE_KW[i])!==-1)return true;return false;}
function isNameH(h){var l=h.toLowerCase().trim();if(isPhoneH(h)||isFNameH(h)||isLNameH(h))return false;for(var i=0;i<NAME_KW.length;i++)if(l.indexOf(NAME_KW[i])!==-1)return true;return false;}
function isFNameH(h){var l=h.toLowerCase().trim();for(var i=0;i<FNAME_KW.length;i++)if(l===FNAME_KW[i])return true;return false;}
function isLNameH(h){var l=h.toLowerCase().trim();for(var i=0;i<LNAME_KW.length;i++)if(l===LNAME_KW[i])return true;return false;}

/* CSV parser that handles empty fields correctly */
function parseCSVLine(line){
  var result=[],current="",inQuotes=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQuotes){if(c==='"'&&(i+1>=line.length||line[i+1]===',')){inQuotes=false;}else{current+=c;}}
    else{if(c==='"'){inQuotes=true;}else if(c===','){result.push(current.trim());current="";}else{current+=c;}}
  }
  result.push(current.trim());
  return result;
}

/* ===== DB TRANSFORMS ===== */
function dbToLead(r){return{id:r.id,name:r.name,phone:r.phone,source:r.source,estimateDate:r.estimate_date,notes:r.notes||"",status:r.status,actions:r.actions||[],createdAt:r.created_at};}
function leadToDb(l,uid){return{user_id:uid,name:l.name,phone:l.phone,source:l.source,estimate_date:l.estimateDate,notes:l.notes,status:l.status,actions:l.actions};}

/* ===== STATE ===== */
var state={
  userId:null,userEmail:null,loading:true,
  authMode:"signin",authError:"",authSuccess:"",authLoading:false,
  leads:[],config:JSON.parse(JSON.stringify(DEFAULT_CONFIG)),contacts:[],
  view:"calendar",currentMonth:{year:new Date().getFullYear(),month:new Date().getMonth()},
  selectedDate:toDS(new Date()),showForm:false,showSettings:false,
  editingLead:null,editMode:false,textMessage:null,copied:false,
  confirmAction:null,callbackLeadId:null,callbackDate:"",callbackTime:"",
  form:{name:"",phone:"",source:"Facebook",estimateDate:toDS(new Date()),notes:""},
  undoData:null,undoLabel:"",contactSearch:"",
  csvImport:null,showNotifRequest:false,notifDismissed:false
};

function setState(u){Object.assign(state,u);render();}

/* ===== AUTH ===== */
async function doSignIn(){
  var e=document.getElementById("auth-email"),p=document.getElementById("auth-pass");
  if(!e||!p||!e.value||!p.value){setState({authError:"Please enter email and password"});return;}
  setState({authLoading:true,authError:""});
  var{error}=await sb.auth.signInWithPassword({email:e.value.trim(),password:p.value});
  if(error)setState({authError:error.message,authLoading:false});
  else setState({authLoading:false});
}
async function doSignUp(){
  var e=document.getElementById("auth-email"),p=document.getElementById("auth-pass");
  if(!e||!p||!e.value||!p.value){setState({authError:"Please enter email and password"});return;}
  if(p.value.length<6){setState({authError:"Password must be at least 6 characters"});return;}
  setState({authLoading:true,authError:""});
  var{error}=await sb.auth.signUp({email:e.value.trim(),password:p.value});
  if(error)setState({authError:error.message,authLoading:false});
  else setState({authLoading:false,authSuccess:"Check your email to confirm your account!",authMode:"signin"});
}
async function doGoogleSignIn(){
  var{error}=await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin+window.location.pathname}});
  if(error)setState({authError:error.message});
}
async function doSignOut(){
  await sb.auth.signOut();
  state.userId=null;state.userEmail=null;state.leads=[];state.contacts=[];
  state.config=JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  render();
}

/* ===== DATA LAYER ===== */
async function loadAllData(){
  state.loading=true;render();
  try{
    var{data:ld}=await sb.from("leads").select("*").eq("user_id",state.userId).order("created_at");
    state.leads=(ld||[]).map(dbToLead);
    var{data:cd}=await sb.from("contacts").select("*").eq("user_id",state.userId);
    state.contacts=(cd||[]).map(function(r){return{id:r.id,name:r.name,phone:r.phone};});
    var{data:cfg}=await sb.from("user_config").select("*").eq("user_id",state.userId).maybeSingle();
    if(cfg){state.config={capDay:cfg.cap_day,callbackMissedText:cfg.callback_missed_text||DEFAULT_CONFIG.callbackMissedText,followUps:cfg.follow_ups||DEFAULT_CONFIG.followUps};}
    else{var def=JSON.parse(JSON.stringify(DEFAULT_CONFIG));await sb.from("user_config").insert({user_id:state.userId,cap_day:def.capDay,callback_missed_text:def.callbackMissedText,follow_ups:def.followUps});state.config=def;}
  }catch(e){console.error("Load error",e);}
  state.loading=false;render();checkNotifications();
}
async function dbInsertLead(l){
  var row=leadToDb(l,state.userId);
  var{data,error}=await sb.from("leads").insert(row).select().single();
  if(error){console.error(error);return null;}
  return dbToLead(data);
}
async function dbUpdateLead(id,updates){
  var{error}=await sb.from("leads").update(updates).eq("id",id);
  if(error)console.error(error);
}
async function dbDeleteLead(id){
  var{error}=await sb.from("leads").delete().eq("id",id);
  if(error)console.error(error);
}

/* ===== BUSINESS LOGIC ===== */
function countInteractions(a){return a.filter(function(x){return x.type==="no_answer";}).length;}
function hasActiveCallback(a){
  var cb=null,na=null;
  for(var i=a.length-1;i>=0;i--){if(!cb&&a[i].type==="callback")cb=a[i];if(!na&&a[i].type==="no_answer")na=a[i];}
  if(!cb)return null;return(na&&new Date(na.date)>new Date(cb.date))?null:cb;
}
function getSchedule(ed,a,cfg){
  var s=new Date(ed);s.setHours(0,0,0,0);var ic=countInteractions(a),fus=cfg.followUps;
  if(ic>=fus.length)return[];var days=fus[ic].day,ti=ic;
  if(days>cfg.capDay){days=cfg.capDay;ti=fus.length-1;}
  var nd=new Date(s);nd.setDate(nd.getDate()+days);return[{date:toDS(nd),daysSince:days,textIndex:ti}];
}
function getActiveLeads(){var cap=state.config.capDay;return state.leads.filter(function(l){return l.status==="active"&&daysLeft(l.estimateDate,cap)>=0;});}
function getCalendarFollowUps(){
  var map={},active=getActiveLeads(),cfg=state.config;
  active.forEach(function(l){
    var cb=hasActiveCallback(l.actions);
    if(cb){var d=cb.callbackDate;if(!map[d])map[d]=[];map[d].push(Object.assign({},l,{followUpType:"callback",callbackTime:cb.callbackTime}));return;}
    var sched=getSchedule(l.estimateDate,l.actions,cfg);
    sched.forEach(function(s){if(!map[s.date])map[s.date]=[];map[s.date].push(Object.assign({},l,{followUpType:"call",daysSince:s.daysSince,textIndex:s.textIndex}));});
  });return map;
}

/* ===== UNDO ===== */
function storeUndo(lead,label){state.undoData=JSON.parse(JSON.stringify(lead));state.undoLabel=label;}
async function doUndo(){
  if(!state.undoData)return;var prev=state.undoData;
  await dbUpdateLead(prev.id,{actions:prev.actions,status:prev.status});
  state.leads=state.leads.map(function(l){return l.id===prev.id?Object.assign({},l,{actions:prev.actions,status:prev.status}):l;});
  setState({undoData:null,undoLabel:"",textMessage:null});
}

async function handleNoAnswer(id){
  var lead=state.leads.find(function(l){return l.id===id;});if(!lead)return;
  storeUndo(lead,"No Answer \u2014 "+lead.name);
  var cfg=state.config,fus=cfg.followUps,cb=hasActiveCallback(lead.actions),ic=countInteractions(lead.actions),msg=null;
  if(cb){msg=applyName(cfg.callbackMissedText,lead.name);}
  else{var ti=ic;if(ti>=fus.length)ti=fus.length-1;msg=ti<fus.length?applyName(fus[ti].text,lead.name):null;}
  var na=lead.actions.concat([{type:"no_answer",date:new Date().toISOString()}]);
  var ns=lead.status,newIc=countInteractions(na);
  if(newIc>=fus.length)ns="expired";else if(fus[newIc].day>cfg.capDay)ns="expired";
  await dbUpdateLead(id,{actions:na,status:ns});
  state.leads=state.leads.map(function(l){return l.id===id?Object.assign({},l,{actions:na,status:ns}):l;});
  setState({confirmAction:null,textMessage:msg?{leadName:lead.name,phone:lead.phone,message:msg,stepNumber:cb?"CB":(ic+1),totalSteps:fus.length,isCallback:!!cb}:null,copied:false});
}
async function recordAction(id,type){
  var lead=state.leads.find(function(l){return l.id===id;});if(lead)storeUndo(lead,type.charAt(0).toUpperCase()+type.slice(1)+" \u2014 "+lead.name);
  var na=lead.actions.concat([{type:type,date:new Date().toISOString()}]);
  var ns=type==="accepted"?"accepted":type==="declined"?"declined":lead.status;
  await dbUpdateLead(id,{actions:na,status:ns});
  state.leads=state.leads.map(function(l){return l.id===id?Object.assign({},l,{actions:na,status:ns}):l;});

/* ===== CSV IMPORT ===== */
function handleCSVFile(){
  var input=document.createElement("input");input.type="file";input.accept=".csv";
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result;var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2)return;
      var headers=parseCSVLine(lines[0]);
      var rows=[];
      for(var i=1;i<lines.length;i++){var parts=parseCSVLine(lines[i]);if(parts.length>=2)rows.push(parts);}
      /* Auto-detect columns */
      var nc=-1,fnc=-1,lnc=-1,pc=-1;
      for(var h=0;h<headers.length;h++){
        if(pc===-1&&isPhoneH(headers[h]))pc=h;
        if(nc===-1&&isNameH(headers[h]))nc=h;
        if(fnc===-1&&isFNameH(headers[h]))fnc=h;
        if(lnc===-1&&isLNameH(headers[h]))lnc=h;
      }
      /* Default name mode: if first+last found use those, else use full name col */
      var nameMode=(fnc!==-1)?"split":"full";
      if(nc===-1&&nameMode==="full")nc=0;
      if(fnc===-1)fnc=(headers.length>1?1:0);
      if(lnc===-1)lnc=(headers.length>2?2:0);
      if(pc===-1)pc=-1; /* no phone mapped */
      setState({csvImport:{step:"mapping",headers:headers,rows:rows,nameMode:nameMode,nameCol:nc,fnameCol:fnc,lnameCol:lnc,phoneCol:pc,mode:"add",duplicates:[],clean:[]}});
    };reader.readAsText(file);
  };input.click();
}
function csvGetName(row,ci){
  if(ci.nameMode==="split"){
    var fn=(ci.fnameCol>=0&&ci.fnameCol<row.length)?row[ci.fnameCol].trim():"";
    var ln=(ci.lnameCol>=0&&ci.lnameCol<row.length)?row[ci.lnameCol].trim():"";
    return(fn+(ln?" "+ln:"")).trim();
  }
  return ci.nameCol>=0&&ci.nameCol<row.length?row[ci.nameCol].trim():"";
}
function csvGetPhone(row,ci){
  if(ci.phoneCol<0)return"";
  var raw=ci.phoneCol<row.length?row[ci.phoneCol]:"";
  return cleanPhone(raw);
}
function csvProceedFromMapping(){
  var ci=state.csvImport;
  /* Read DOM values */
  var nmEl=document.querySelector('input[name="csv-name-mode"]:checked');
  if(nmEl)ci.nameMode=nmEl.value;
  if(ci.nameMode==="full"){var ncEl=document.getElementById("csv-name-col");if(ncEl)ci.nameCol=parseInt(ncEl.value);}
  else{var fncEl=document.getElementById("csv-fname-col"),lncEl=document.getElementById("csv-lname-col");if(fncEl)ci.fnameCol=parseInt(fncEl.value);if(lncEl)ci.lnameCol=parseInt(lncEl.value);}
  var pcEl=document.getElementById("csv-phone-col");if(pcEl)ci.phoneCol=parseInt(pcEl.value);
  var modeEls=document.querySelectorAll('input[name="csv-mode"]');
  modeEls.forEach(function(el){if(el.checked)ci.mode=el.value;});
  /* Extract contacts */
  var newContacts=[];
  ci.rows.forEach(function(row){
    var name=csvGetName(row,ci);
    var phone=csvGetPhone(row,ci);
    if(name)newContacts.push({name:name,phone:phone});
  });
  if(ci.mode==="replace"){ci.clean=newContacts;ci.duplicates=[];finishCSVImport();return;}
  var dups=[],clean=[];
  newContacts.forEach(function(nc){
    var match=state.contacts.find(function(ec){return(ec.phone&&nc.phone&&ec.phone===nc.phone)||ec.name.toLowerCase()===nc.name.toLowerCase();});
    if(match)dups.push({csv:nc,existing:match,action:"skip"});else clean.push(nc);
  });
  if(!dups.length){ci.clean=clean;ci.duplicates=[];finishCSVImport();return;}
  ci.duplicates=dups;ci.clean=clean;ci.step="duplicates";render();
}
function csvSetDupAction(idx,action){state.csvImport.duplicates[idx].action=action;render();}
function csvBulkDup(action){state.csvImport.duplicates.forEach(function(d){d.action=action;});render();}
async function finishCSVImport(){
  var ci=state.csvImport;
  var toImport=ci.clean.slice();
  if(ci.duplicates){ci.duplicates.forEach(function(d){if(d.action==="import")toImport.push(d.csv);});}
  if(ci.mode==="replace"){await dbReplaceContacts(toImport);}
  else{await dbAddContacts(toImport);}
  setState({csvImport:null});
  alert("Imported "+toImport.length+" contact"+(toImport.length!==1?"s":"")+"!");
}

function checkNotifications(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default"&&!state.notifDismissed)state.showNotifRequest=true;
  if(Notification.permission==="granted")fireNotif();
  render();
}
function requestNotifPerm(){
  Notification.requestPermission().then(function(p){state.showNotifRequest=false;if(p==="granted")fireNotif();render();});
}
function fireNotif(){
  var calFU=getCalendarFollowUps();var today=toDS(new Date());var tl=calFU[today]||[];
  if(!tl.length)return;
  var names=tl.map(function(l){return l.name;}).join(", ");
  try{new Notification("Follow-up Reminder",{body:tl.length+" follow-up"+(tl.length>1?"s":"")+" today: "+names});}catch(e){}
}

    +'<button class="btn btn-outline" onclick="handleCSVFile()" style="padding:8px 10px;font-size:12px">\ud83d\udcc2 Import</button>'
    +'<button class="btn btn-outline" onclick="setState({showSettings:true})" style="padding:8px 10px">Settings</button>'
    +'<button class="btn btn-primary" onclick="setState({showForm:true})">+ Add</button></div></div>'
    +notifBanner+todayBanner+undoBar
    +'<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#1877F2"></div>Facebook</div>'
    +'<div class="legend-item"><div class="legend-dot" style="background:#EA4335"></div>Google</div>'
    +'<div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div>Callback</div></div>'
    +tabBar
    +(state.view==="calendar"?
    '<div class="content"><div class="cal-nav">'
    +'<button onclick="setState({currentMonth:state.currentMonth.month===0?{year:state.currentMonth.year-1,month:11}:{year:state.currentMonth.year,month:state.currentMonth.month-1}})">\u2039</button>'
    +'<h2>'+MONTHS[month]+' '+year+'</h2>'
    +'<button onclick="setState({currentMonth:state.currentMonth.month===11?{year:state.currentMonth.year+1,month:0}:{year:state.currentMonth.year,month:state.currentMonth.month+1}})">\u203a</button></div>'
    +'<div class="cal-grid"><div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div><div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>'
    +calDays+'</div>'
    +'<h3 class="section-title">'+selDateLabel+(selLeads.length?' <span class="section-sub">\u2014 '+selLeads.length+' follow-up'+(selLeads.length!==1?"s":"")+'</span>':"")+'</h3>'
    +selectedHTML+'</div>'
    :'<div class="content">'+contactsHTML+'</div>')
    +modals;
}

/* ===== INIT ===== */
async function init(){
  if(!sb){document.getElementById("app").innerHTML='<div class="loading-wrap"><p style="color:#EF4444">Could not connect to database. Deploy to GitHub Pages for full functionality.</p></div>';return;}
  render();
  var{data:{session}}=await sb.auth.getSession();
  if(session){state.userId=session.user.id;state.userEmail=session.user.email;await loadAllData();}
  else{state.loading=false;render();}
  sb.auth.onAuthStateChange(async function(event,session){
    if(event==="SIGNED_IN"&&session&&state.userId!==session.user.id){state.userId=session.user.id;state.userEmail=session.user.email;await loadAllData();}
    else if(event==="SIGNED_OUT"){state.userId=null;state.userEmail=null;state.leads=[];state.contacts=[];state.config=JSON.parse(JSON.stringify(DEFAULT_CONFIG));state.loading=false;render();}
  });
}
init();
</script>

</style>

      var kr=Math.round(d[i]/32)*32,kg=Math.round(d[i+1]/32)*32,kb=Math.round(d[i+2]/32)*32;
      var k=kr+","+kg+","+kb;
      if(!bk[k])bk[k]={r:d[i],g:d[i+1],b:d[i+2],n:0};
      bk[k].n++;bk[k].r=(bk[k].r+d[i])/2;bk[k].g=(bk[k].g+d[i+1])/2;bk[k].b=(bk[k].b+d[i+2])/2;
    }
    var sorted=Object.values(bk).sort(function(a,b){return b.n-a.n;});
    var cols=[];
    for(var i=0;i<sorted.length&&cols.length<5;i++){
      var s=sorted[i],r=Math.round(s.r),g=Math.round(s.g),b=Math.round(s.b);
      var ok=true;
      for(var j=0;j<cols.length;j++){if(Math.abs(r-cols[j][0])+Math.abs(g-cols[j][1])+Math.abs(b-cols[j][2])<80){ok=false;break;}}
      /* Skip very dark or very light colors */
      var lum=r*0.299+g*0.587+b*0.114;
      if(lum<30||lum>240)continue;
      if(ok)cols.push([r,g,b]);
    }
    while(cols.length<5)cols.push([59,130,246]);
    /* Sort: most saturated first for primary, then by hue */
    var hex=cols.map(function(c){return"#"+c.map(function(v){return Math.min(255,Math.max(0,v)).toString(16).padStart(2,"0");}).join("");});
    cb(hex);
  };
  img.onerror=function(){cb(DEF_COLORS.slice());};
  img.src=src;
}

  r.style.setProperty("--c4",c[3]);
  r.style.setProperty("--c5",c[4]);
}

function getSched(ed,a,cfg){var s=new Date(ed);s.setHours(0,0,0,0);var ic=cntNA(a),fu=cfg.followUps;if(ic>=fu.length)return[];var dy=fu[ic].day,ti=ic;if(dy>cfg.capDay){dy=cfg.capDay;ti=fu.length-1;}var nd=new Date(s);nd.setDate(nd.getDate()+dy);return[{date:toDS(nd),daysSince:dy,textIndex:ti}];}

>Cancel</button><button class="btn-submit" style="background:var(--c4);flex:0;padding:8px 20px" onclick="saveEdit()">\u2713 Save</button></div></div>';}else{dt='<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px"><div><h3 style="font-size:18px;margin:0">'+el.name+'</h3><p style="font-size:13px;color:var(--c-text3);margin-top:4px">'+fmtPhone(el.phone)+'</p></div><div style="display:flex;gap:6px;align-items:center"><button style="padding:5px 10px;border-radius:6px;border:1px solid var(--c1);background:transparent;color:var(--c1);cursor:pointer;font-size:12px;font-weight:600" onclick="setState({editMode:true})">Edit</button><span class="badge" style="background:'+SRC_COLORS[el.source]+'22;color:'+SRC_COLORS[el.source]+'">'+el.source+'</span></div></div>';}modals+='<div class="modal-overlay" style="z-index:998"><div class="modal" style="max-width:420px">'+dt+(!state.editMode?'<div class="info-grid"><div class="info-box"><div class="info-label">Estimate Date</div><div class="info-value">'+new Date(el.estimateDate+"T12:00:00").toLocaleDateString()+'</div></div><div class="info-box"><div class="info-label">Days Left</div><div class="info-value" style="color:'+(dl<=5?"var(--c5)":"var(--c-text)")+'">'+Math.max(0,dl)+'</div></div></div>'+(el.notes?'<div style="background:var(--c-bg3);border-radius:8px;padding:10px;margin-bottom:16px;font-size:13px;color:var(--c-text3)">'+el.notes+'</div>':""):"")+'<h4 style="font-size:13px;color:var(--c-text4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Activity Log</h4><div style="margin-bottom:16px">'+lgH+'</div><div style="display:flex;gap:8px"><button style="padding:10px 16px;border-radius:8px;border:1px solid var(--c5);background:transparent;color:var(--c5);cursor:pointer;font-size:13px" onclick="delLead(\''+el.id+'\')">Delete</button><div style="flex:1"></div><button style="padding:10px 20px;border-radius:8px;border:none;background:var(--c-border2);color:var(--c-text);cursor:pointer;font-size:13px" onclick="setState({editingLead:null,editMode:false})">Close</button></div></div></div>';}

  /* CSV Mapping */
  if(state.csvImport&&state.csvImport.step==="mapping"){var ci=state.csvImport;var hO="";for(var h=0;h<ci.headers.length;h++)hO+='<option value="'+h+'">'+escA(ci.headers[h])+'</option>';var nmH='<div style="margin-bottom:12px"><div style="font-size:13px;color:var(--c-text3);margin-bottom:6px">Name format:</div><div style="display:flex;gap:8px;margin-bottom:8px"><label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--c-text);cursor:pointer"><input type="radio" name="csv-nm" value="full"'+(ci.nameMode==="full"?' checked':'')+' onchange="csvNM(\'full\')"> Full Name</label><label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--c-text);cursor:pointer"><input type="radio" name="csv-nm" value="split"'+(ci.nameMode==="split"?' checked':'')+' onchange="csvNM(\'split\')"> First + Last</label></div>';if(ci.nameMode==="full"){var nO=hO.replace('value="'+ci.nameCol+'"','value="'+ci.nameCol+'" selected');nmH+='<div class="csv-map-row"><span class="csv-map-label">Name</span><select class="csv-map-select" id="csv-nc" onchange="state.csvImport.nameCol=parseInt(this.value);csvPrev()">'+nO+'</select></div>';}else{var fO=hO.replace('value="'+ci.fnameCol+'"','value="'+ci.fnameCol+'" selected');var lO=hO.replace('value="'+ci.lnameCol+'"','value="'+ci.lnameCol+'" selected');nmH+='<div class="csv-map-row"><span class="csv-map-label">First</span><select class="csv-map-select" id="csv-fnc" onchange="state.csvImport.fnameCol=parseInt(this.value);csvPrev()">'+fO+'</select></div><div class="csv-map-row"><span class="csv-map-label">Last</span><select class="csv-map-select" id="csv-lnc" onchange="state.csvImport.lnameCol=parseInt(this.value);csvPrev()">'+lO+'</select></div>';}nmH+='</div>';var pO='<option value="-1">(None)</option>'+hO;if(ci.phoneCol>=0)pO=pO.replace('value="'+ci.phoneCol+'"','value="'+ci.phoneCol+'" selected');var pvH="";var sh=ci.rows.slice(0,3);for(var i=0;i<sh.length;i++)pvH+="<tr><td>"+escA(csvName(sh[i],ci))+"</td><td>"+(csvPhone(sh[i],ci)?fmtPhone(csvPhone(sh[i],ci)):"(none)")+"</td></tr>";modals+='<div class="modal-overlay"><div class="modal" style="max-width:460px"><h2 style="font-size:18px">Import</h2><div class="ss-title">Map Columns</div>'+nmH+'<div class="csv-map-row"><span class="csv-map-label">Phone</span><select class="csv-map-select" id="csv-pc" onchange="state.csvImport.phoneCol=parseInt(this.value);csvPrev()">'+pO+'</select></div><div class="ss-title" style="margin-top:12px">Preview</div><div class="csv-preview"><table><thead><tr><th>Name</th><th>Phone</th></tr></thead><tbody id="csv-prev">'+pvH+'</tbody></table></div><div class="ss-title" style="margin-top:12px">Mode</div><div class="csv-option'+(ci.mode==="replace"?" selected":"")+'"><input type="radio" name="csv-mode" value="replace"'+(ci.mode==="replace"?" checked":"")+'><label>Replace all</label></div><div class="csv-option'+(ci.mode==="add"?" selected":"")+'"><input type="radio" name="csv-mode" value="add"'+(ci.mode==="add"?" checked":"")+'><label>Add to existing</label></div><div style="font-size:11px;color:var(--c-text4);margin:4px 0 12px">'+ci.rows.length+' contacts</div><div class="btn-row"><button class="btn-cancel" onclick="setState({csvImport:null})">Cancel</button><button class="btn-submit" style="background:var(--c1)" onclick="csvProceed()">Import</button></div></div></div>';}
  /* CSV Dups */
  if(state.csvImport&&state.csvImport.step==="duplicates"){var ci2=state.csvImport;var dpC="";for(var i=0;i<ci2.duplicates.length;i++){var dp=ci2.duplicates[i],isSk=dp.action==="skip";dpC+='<div class="dup-card"><div style="font-size:13px;color:var(--c-text)">'+escA(dp.csv.name)+' \u2014 '+fmtPhone(dp.csv.phone)+'</div><div style="font-size:12px;color:var(--c2);margin-top:4px">Match: '+escA(dp.existing.name)+'</div><div style="display:flex;gap:6px;margin-top:8px"><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(isSk?'var(--c2)':'var(--c-border2)')+';background:'+(isSk?'color-mix(in srgb,var(--c2) 10%,transparent)':'transparent')+';color:'+(isSk?'var(--c2)':'var(--c-text4)')+'" onclick="csvDupAct('+i+',\'skip\')">Skip</button><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(!isSk?'var(--c1)':'var(--c-border2)')+';background:'+(!isSk?'color-mix(in srgb,var(--c1) 10%,transparent)':'transparent')+';color:'+(!isSk?'var(--c1)':'var(--c-text4)')+'" onclick="csvDupAct('+i+',\'import\')">Import</button></div></div>';}modals+='<div class="modal-overlay"><div class="modal" style="max-width:460px"><h2 style="font-size:18px">'+ci2.duplicates.length+' Duplicate'+(ci2.duplicates.length>1?'s':'')+'</h2><div class="bulk-btns"><button class="bulk-btn" onclick="csvBulk(\'skip\')">Skip All</button><button class="bulk-btn" onclick="csvBulk(\'import\')">Import All</button></div>'+dpC+'<div style="font-size:12px;color:var(--c-text4);margin:8px 0">'+ci2.clean.length+' new will also import</div><div class="btn-row"><button class="btn-cancel" onclick="setState({csvImport:null})">Cancel</button><button class="btn-submit" style="background:var(--c1)" onclick="csvFinish()">Confirm</button></div></div></div>';}

  var tabB='<div class="tab-bar"><button class="tab-btn'+(state.view==="calendar"?" active":"")+'" onclick="setState({view:\'calendar\'})">\ud83d\udcc5 Calendar</button><button class="tab-btn'+(state.view==="contacts"?" active":"")+'" onclick="setState({view:\'contacts\',contactSearch:\'\'})">\ud83d\udccb Contacts</button></div>';

  var logoCenter=state.logoBase64?'<div class="header-center"><img src="'+state.logoBase64+'" class="header-logo"></div>':"";

  var pg='<div class="header-wrap">';
  pg+='<div class="header-left"><div><h1>Lead Tracker</h1><span>'+act.length+' active \u00b7 <button class="sign-out-btn" onclick="doSignOut()">Sign Out</button></span></div></div>';
  pg+=logoCenter;
  pg+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  pg+='<button class="btn btn-outline" onclick="csvFile()" style="padding:6px 10px;font-size:12px">\ud83d\udcc2</button>';
  pg+='<button class="btn btn-outline" onclick="setState({showSettings:true,settingsTab:\'followups\'})" style="padding:6px 10px;font-size:12px">\u2699\ufe0f</button>';
  pg+='<button class="btn btn-primary" onclick="setState({showForm:true})" style="padding:6px 10px;font-size:12px">+ Lead</button>';
  pg+='<button class="btn btn-outline" onclick="setState({showAddContact:true})" style="padding:6px 10px;font-size:12px">+ Contact</button>';
  pg+='</div></div>';
  pg+=nBan+tBan+uBar;
  pg+='<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--c1)"></div>Facebook</div><div class="legend-item"><div class="legend-dot" style="background:var(--c5)"></div>Google</div><div class="legend-item"><div class="legend-dot" style="background:var(--c3)"></div>Callback</div></div>';
  pg+=tabB;
  if(state.view==="calendar"){
    pg+='<div class="content">';
    pg+='<div class="cal-nav"><button onclick="setState({currentMonth:state.currentMonth.month===0?{year:yr-1,month:11}:{year:yr,month:mo-1}})">\u2039</button><h2>'+MONTHS[mo]+' '+yr+'</h2><button onclick="setState({currentMonth:state.currentMonth.month===11?{year:yr+1,month:0}:{year:yr,month:mo+1}})">\u203a</button></div>';
    pg+='<div class="cal-grid"><div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div><div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>'+cDays+'</div>';
    pg+='<h3 class="section-title">'+sdl+(sl.length?' <span class="section-sub">\u2014 '+sl.length+' follow-up'+(sl.length!==1?"s":"")+'</span>':"")+'</h3>';
    pg+=selHTML;
    pg+='</div>';
  } else {
    pg+='<div class="content">'+ctHTML+'</div>';
  }
  pg+=modals;
  app.innerHTML=pg;
}

async function init(){
  if(!sb){document.getElementById("app").innerHTML='<div class="loading-wrap"><p style="color:var(--c5)">Could not connect.</p></div>';return;}
  render();
  var{data:{session}}=await sb.auth.getSession();
  if(session){state.userId=session.user.id;state.userEmail=session.user.email;await loadAll();}
  else{state.loading=false;render();}
  sb.auth.onAuthStateChange(async function(ev,ses){
    if(ev==="SIGNED_IN"&&ses&&state.userId!==ses.user.id){state.userId=ses.user.id;state.userEmail=ses.user.email;await loadAll();}
    else if(ev==="SIGNED_OUT"){Object.assign(state,{userId:null,userEmail:null,leads:[],contacts:[],config:JSON.parse(JSON.stringify(DEF_CFG)),logoBase64:"",themeMode:"dark",themeColors:DEF_COLORS.slice(),loading:false});applyTheme();render();}
  });
}
init();
</script>

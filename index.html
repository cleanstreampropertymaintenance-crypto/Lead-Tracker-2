<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B1120">
<title>Lead Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B1120;color:#E2E8F0;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
.header{padding:16px 20px;border-bottom:1px solid #1E293B;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:700;color:#F1F5F9}
.header span{font-size:12px;color:#64748B}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:#3B82F6;color:#fff}
.btn-outline{border:1px solid #334155;background:#1E293B;color:#E2E8F0}
.btn-icon{background:none;border:none;color:#94A3B8;cursor:pointer;font-size:18px;padding:8px}
.legend{padding:8px 20px;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid #1E293B}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#94A3B8}
.legend-dot{width:8px;height:8px;border-radius:4px}
.content{padding:16px 20px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav button{background:none;border:none;color:#94A3B8;font-size:20px;cursor:pointer;padding:8px}
.cal-nav h2{font-size:16px;color:#F1F5F9}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{text-align:center;font-size:11px;color:#475569;padding:4px}
.cal-day{min-height:44px;border-radius:8px;padding:2px 4px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.cal-day.selected{background:#3B82F6}
.cal-day.today{background:#1E3A5F;border-color:#3B82F6}
.cal-day.has-events{background:#1a2332}
.cal-day-num{font-size:12px;text-align:right;padding:2px 4px;color:#94A3B8}
.cal-day.selected .cal-day-num{color:#fff;font-weight:700}
.cal-day.today .cal-day-num{color:#60A5FA;font-weight:700}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;padding:0 2px}
.cal-dot{width:6px;height:6px;border-radius:3px}
.section-title{font-size:15px;color:#F1F5F9;margin:20px 0 12px}
.section-sub{font-size:13px;color:#64748B;font-weight:400}
.card{background:#1E293B;border-radius:12px;padding:14px;margin-bottom:8px}
.card-empty{text-align:center;padding:24px;color:#475569;font-size:14px}
.lead-name{font-size:15px;font-weight:600;color:#F1F5F9}
.lead-phone{font-size:13px;color:#94A3B8}
.lead-meta{font-size:11px;color:#64748B;margin-top:2px}
.badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.action-btn{padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;background:transparent}
.action-btn.no-answer{border:1px solid #F59E0B;color:#F59E0B;background:#F59E0B15}
.action-btn.callback{border:1px solid #8B5CF6;color:#8B5CF6;background:#8B5CF615}
.action-btn.accepted{border:1px solid #10B981;color:#10B981;background:#10B98115}
.action-btn.declined{border:1px solid #EF4444;color:#EF4444;background:#EF444415}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center;z-index:999;padding:20px}
.modal{background:#1E293B;border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow:auto}
.modal h2,.modal h3{color:#F1F5F9;margin-bottom:16px}
.form-label{display:block;font-size:12px;color:#94A3B8;margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#E2E8F0;font-size:14px;box-sizing:border-box}
.form-group{margin-bottom:12px}
.source-btn{flex:1;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.source-btn.active-fb{border:2px solid #1877F2;background:#1877F222;color:#1877F2}
.source-btn.active-g{border:2px solid #EA4335;background:#EA433522;color:#EA4335}
.source-btn.inactive{border:1px solid #334155;background:#0F172A;color:#94A3B8}
.btn-row{display:flex;gap:8px}
.btn-cancel{flex:1;padding:12px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94A3B8;cursor:pointer;font-size:14px}
.btn-submit{flex:1;padding:12px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.text-preview{background:#0F172A;border-radius:12px;padding:14px;margin-bottom:16px;font-size:14px;color:#E2E8F0;line-height:1.5;white-space:pre-wrap}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-box{background:#0F172A;border-radius:8px;padding:10px}
.info-label{font-size:11px;color:#64748B}
.info-value{font-size:13px;color:#E2E8F0}
.log-item{display:flex;gap:8px;align-items:start;padding:6px 0;border-bottom:1px solid #1a2332}
.log-dot{width:8px;height:8px;border-radius:4px;margin-top:5px;flex-shrink:0}
.log-text{font-size:13px;color:#E2E8F0}
.log-date{font-size:11px;color:#475569}
.list-card{cursor:pointer;border:1px solid transparent;transition:border .15s}
.sms-link{flex:2;padding:12px;border-radius:8px;background:#10B981;color:#fff;font-size:14px;font-weight:600;text-decoration:none;text-align:center;display:block}
.text-edit-card{background:#0F172A;border-radius:10px;padding:12px;margin-bottom:10px}
.text-edit-num{font-size:11px;font-weight:700;color:#60A5FA;margin-bottom:6px}
.text-edit-area{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#1E293B;color:#E2E8F0;font-size:13px;resize:vertical;box-sizing:border-box;min-height:60px;line-height:1.4}
.text-edit-hint{font-size:11px;color:#64748B;margin-top:4px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:15px;color:#F1F5F9;margin-bottom:4px}
.settings-section p{font-size:12px;color:#64748B;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var STORAGE_KEY="leads-tracker-v3";
var TEXTS_KEY="leads-texts-v1";
var CADENCE=[1,3,6,10,15,20,25,30];
var DEFAULT_TEXTS=[
"Hey name! Just tried calling and left a voicemail \u2014 went ahead and sent your estimate over. Just hit the accept button at the top to get your spot locked in \ud83d\udc4d",
"Hey name! Just making sure you got that estimate okay \u2014 just hit accept at the top whenever you're ready and I'll get you on the schedule!",
"Hey name! We've got an opening this week \u2014 just hit accept on that estimate to grab your spot before it's gone \ud83d\udc4d",
"Hey name! Still got you in mind \u2014 did you get a chance to look everything over?",
"Hey name! Just checking in \u2014 is there anything on the estimate that didn't look right?",
"Hey name! No worries if life's been busy \u2014 still here whenever you're ready!",
"Hey name! Still thinking it over? Happy to answer anything \u2014 just text me back \ud83d\udc4d",
"Hey name! Last time reaching out \u2014 if you still want to get the house taken care of just let me know. Hope to hear from you! \ud83d\ude0a"
];
var SRC_COLORS={Facebook:"#1877F2",Google:"#EA4335"};
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

function loadLeads(){try{var d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):[];}catch(e){return[];}}
function saveLeads(leads){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(leads));}catch(e){}}
function loadTexts(){try{var d=localStorage.getItem(TEXTS_KEY);return d?JSON.parse(d):DEFAULT_TEXTS.slice();}catch(e){return DEFAULT_TEXTS.slice();}}
function saveTexts(texts){try{localStorage.setItem(TEXTS_KEY,JSON.stringify(texts));}catch(e){}}
function getFirstName(n){return n.trim().split(/\s+/)[0];}
function applyName(template,leadName){var fn=getFirstName(leadName);return template.replace(/\bname\b/gi,fn);}
function fmtPhone(p){var d=p.replace(/\D/g,"");if(d.length===10)return"("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);if(d.length===11)return"("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);return p;}
function toDS(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function daysLeft(ed){var s=new Date(ed);s.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return 30-Math.floor((t-s)/864e5);}

function getSchedule(ed,actions){
  var s=new Date(ed);s.setHours(0,0,0,0);
  var nc=actions.filter(function(a){return a.type==="no_answer"}).length;
  if(nc>=CADENCE.length)return[];
  var days=CADENCE[nc],ti=nc;
  if(days>30){days=30;ti=state.texts.length-1;}
  var nd=new Date(s);nd.setDate(nd.getDate()+days);
  return[{date:toDS(nd),daysSince:days,stepIndex:nc,textIndex:ti}];
}

var state={
  leads:loadLeads(),
  texts:loadTexts(),
  view:"calendar",
  currentMonth:{year:new Date().getFullYear(),month:new Date().getMonth()},
  selectedDate:toDS(new Date()),
  showForm:false,
  showSettings:false,
  editingLead:null,
  textMessage:null,
  copied:false,
  confirmAction:null,
  callbackLeadId:null,
  callbackDate:"",
  callbackTime:"",
  form:{name:"",phone:"",source:"Facebook",estimateDate:toDS(new Date()),notes:""}
};

function setState(updates){Object.assign(state,updates);render();}

function getActiveLeads(){return state.leads.filter(function(l){return l.status==="active"&&daysLeft(l.estimateDate)>=0;});}

function getCalendarFollowUps(){
  var map={},active=getActiveLeads();
  active.forEach(function(l){
    var lastCb=null,lastNA=null;
    for(var i=l.actions.length-1;i>=0;i--){if(!lastCb&&l.actions[i].type==="callback")lastCb=l.actions[i];if(!lastNA&&l.actions[i].type==="no_answer")lastNA=l.actions[i];}
    var cbFailed=lastCb&&lastNA&&new Date(lastNA.date)>new Date(lastCb.date);
    if(lastCb&&!cbFailed){
      var d=lastCb.callbackDate;
      if(!map[d])map[d]=[];
      map[d].push(Object.assign({},l,{followUpType:"callback",callbackTime:lastCb.callbackTime}));
      return;
    }
    if(cbFailed){
      var es=new Date(l.estimateDate);es.setHours(0,0,0,0);
      var cd=new Date(lastCb.callbackDate+"T12:00:00");
      var ds=Math.floor((cd-es)/864e5);
      if(ds<30){
        var d30=new Date(es);d30.setDate(d30.getDate()+30);
        var dd=toDS(d30);
        if(!map[dd])map[dd]=[];
        map[dd].push(Object.assign({},l,{followUpType:"call",daysSince:30,textIndex:state.texts.length-1}));
      }
      return;
    }
    var sched=getSchedule(l.estimateDate,l.actions);
    sched.forEach(function(s){
      if(!map[s.date])map[s.date]=[];
      map[s.date].push(Object.assign({},l,{followUpType:"call",daysSince:s.daysSince,stepIndex:s.stepIndex,textIndex:s.textIndex}));
    });
  });
  return map;
}

function addLead(){
  var f=state.form;
  if(!f.name.trim()||!f.phone.trim())return;
  var nl={id:Date.now().toString(),name:f.name.trim(),phone:f.phone.trim(),source:f.source,estimateDate:f.estimateDate,notes:f.notes.trim(),status:"active",actions:[],createdAt:new Date().toISOString()};
  var leads=state.leads.concat([nl]);
  saveLeads(leads);
  setState({leads:leads,showForm:false,form:{name:"",phone:"",source:"Facebook",estimateDate:toDS(new Date()),notes:""}});
}

function handleNoAnswer(id){
  var lead=null;
  for(var i=0;i<state.leads.length;i++){if(state.leads[i].id===id){lead=state.leads[i];break;}}
  if(!lead)return;
  var nc=lead.actions.filter(function(a){return a.type==="no_answer"}).length;
  var lastCb=null;
  for(var i=lead.actions.length-1;i>=0;i--){if(lead.actions[i].type==="callback"){lastCb=lead.actions[i];break;}}
  var ti=nc,msg=null;
  if(lastCb){
    ti=state.texts.length-1;
    msg=applyName(state.texts[ti],lead.name);
  } else {
    var nsi=nc+1;
    if(nsi<CADENCE.length&&CADENCE[nsi]>30)ti=state.texts.length-1;
    msg=ti<state.texts.length?applyName(state.texts[ti],lead.name):null;
  }
  var leads=state.leads.map(function(l){
    if(l.id!==id)return l;
    var na=l.actions.concat([{type:"no_answer",date:new Date().toISOString()}]);
    var ns=l.status;
    if(lastCb){
      var es=new Date(l.estimateDate);es.setHours(0,0,0,0);
      var cd=new Date(lastCb.callbackDate+"T12:00:00");
      if(Math.floor((cd-es)/864e5)>=30)ns="expired";
    } else {
      var nnc=na.filter(function(a){return a.type==="no_answer"}).length;
      var next=nnc<CADENCE.length?CADENCE[nnc]:999;
      if(next>30)ns="expired";
    }
    return Object.assign({},l,{actions:na,status:ns});
  });
  saveLeads(leads);
  setState({leads:leads,confirmAction:null,textMessage:msg?{leadName:lead.name,phone:lead.phone,message:msg,stepNumber:ti+1}:null,copied:false});
}

function recordAction(id,type){
  var leads=state.leads.map(function(l){
    if(l.id!==id)return l;
    var na=l.actions.concat([{type:type,date:new Date().toISOString()}]);
    var ns=l.status;
    if(type==="accepted")ns="accepted";
    if(type==="declined")ns="declined";
    return Object.assign({},l,{actions:na,status:ns});
  });
  saveLeads(leads);
  setState({leads:leads,confirmAction:null});
}

function setCallback(id){
  if(!state.callbackDate)return;
  var leads=state.leads.map(function(l){
    if(l.id!==id)return l;
    return Object.assign({},l,{actions:l.actions.concat([{type:"callback",date:new Date().toISOString(),callbackDate:state.callbackDate,callbackTime:state.callbackTime}])});
  });
  saveLeads(leads);
  setState({leads:leads,callbackLeadId:null,callbackDate:"",callbackTime:""});
}

function deleteLead(id){
  var leads=state.leads.filter(function(l){return l.id!==id;});
  saveLeads(leads);
  setState({leads:leads,editingLead:null});
}

function copyText(text){
  navigator.clipboard.writeText(text).then(function(){
    setState({copied:true});
    setTimeout(function(){setState({copied:false})},2000);
  }).catch(function(){
    var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    setState({copied:true});setTimeout(function(){setState({copied:false})},2000);
  });
}

function saveSettingsTexts(){
  var texts=[];
  for(var i=0;i<8;i++){
    var el=document.getElementById("text-edit-"+i);
    texts.push(el?el.value:state.texts[i]);
  }
  saveTexts(texts);
  setState({texts:texts,showSettings:false});
}

function resetTexts(){
  saveTexts(DEFAULT_TEXTS.slice());
  setState({texts:DEFAULT_TEXTS.slice()});
}

function render(){
  var app=document.getElementById("app");
  var active=getActiveLeads();
  var calFU=getCalendarFollowUps();
  var selLeads=calFU[state.selectedDate]||[];
  var year=state.currentMonth.year,month=state.currentMonth.month;
  var firstDay=new Date(year,month,1).getDay();
  var dim=new Date(year,month+1,0).getDate();
  var todayStr=toDS(new Date());

  var calDays="";
  for(var i=0;i<firstDay;i++)calDays+='<div style="min-height:44px"></div>';
  for(var d=1;d<=dim;d++){
    var ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var fups=calFU[ds]||[];
    var isToday=ds===todayStr,isSel=ds===state.selectedDate;
    var cls="cal-day";
    if(isSel)cls+=" selected";else if(isToday)cls+=" today";else if(fups.length)cls+=" has-events";
    var dots="";
    if(fups.length){
      var dotHTML="";
      for(var j=0;j<Math.min(fups.length,3);j++){
        var col=fups[j].followUpType==="callback"?"#8B5CF6":(SRC_COLORS[fups[j].source]||"#3B82F6");
        dotHTML+='<div class="cal-dot" style="background:'+col+'"></div>';
      }
      if(fups.length>3)dotHTML+='<span style="font-size:9px;color:#64748B">+'+(fups.length-3)+'</span>';
      dots='<div class="cal-dots">'+dotHTML+'</div>';
    }
    calDays+='<div class="'+cls+'" onclick="setState({selectedDate:\''+ds+'\'})">'+'<div class="cal-day-num">'+d+'</div>'+dots+'</div>';
  }

  var selectedHTML="";
  if(selLeads.length===0){
    selectedHTML='<div class="card card-empty">No follow-ups scheduled</div>';
  } else {
    var cards="";
    for(var i=0;i<selLeads.length;i++){
      var l=selLeads[i];
      var nc=l.actions.filter(function(a){return a.type==="no_answer"}).length;
      var meta="";
      if(l.followUpType==="callback"&&l.callbackTime)meta='<div style="font-size:12px;color:#8B5CF6;margin-top:2px">\ud83d\udcde Callback at '+l.callbackTime+'</div>';
      else if(l.followUpType==="call")meta='<div class="lead-meta">Follow-up #'+(nc+1)+' of 8 \u00b7 Day '+l.daysSince+'</div>';
      cards+='<div class="card">'
        +'<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">'
        +'<div onclick="setState({editingLead:state.leads.find(function(x){return x.id===\''+l.id+'\'})})" style="cursor:pointer">'
        +'<div class="lead-name">'+l.name+'</div>'
        +'<div class="lead-phone">'+fmtPhone(l.phone)+'</div>'+meta+'</div>'
        +'<span class="badge" style="background:'+SRC_COLORS[l.source]+'22;color:'+SRC_COLORS[l.source]+'">'+l.source+'</span></div>'
        +'<div class="actions">'
        +'<button class="action-btn no-answer" onclick="handleNoAnswer(\''+l.id+'\')">No Answer</button>'
        +'<button class="action-btn callback" onclick="setState({callbackLeadId:\''+l.id+'\'})">Callback</button>'
        +'<button class="action-btn accepted" onclick="setState({confirmAction:{msg:\''+l.name.replace(/'/g,"\\'")+' accepted the estimate?\',label:\'Accepted\',color:\'#10B981\',id:\''+l.id+'\',type:\'accepted\'}})">Accepted</button>'
        +'<button class="action-btn declined" onclick="setState({confirmAction:{msg:\''+l.name.replace(/'/g,"\\'")+' declined the estimate?\',label:\'Declined\',color:\'#EF4444\',id:\''+l.id+'\',type:\'declined\'}})">Declined</button>'
        +'</div></div>';
    }
    selectedHTML=cards;
  }

  var selDateLabel=new Date(state.selectedDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  var listHTML="";
  if(state.view==="list"){
    if(state.leads.length===0){
      listHTML='<div class="card card-empty">No leads yet. Add your first lead!</div>';
    } else {
      var items="";
      var reversed=state.leads.slice().reverse();
      for(var i=0;i<reversed.length;i++){
        var l=reversed[i];
        var sc=l.status==="active"?(SRC_COLORS[l.source]||"#3B82F6"):l.status==="accepted"?"#10B981":l.status==="declined"?"#EF4444":"#64748B";
        var sl=l.status==="active"?l.source:l.status.charAt(0).toUpperCase()+l.status.slice(1);
        var dl=l.status==="active"?'<div style="font-size:11px;color:#64748B;margin-top:4px">'+daysLeft(l.estimateDate)+'d left</div>':"";
        items+='<div class="card list-card" onclick="setState({editingLead:state.leads.find(function(x){return x.id===\''+l.id+'\'})})">'
          +'<div style="display:flex;justify-content:space-between;align-items:center">'
          +'<div><div class="lead-name">'+l.name+'</div><div class="lead-phone">'+fmtPhone(l.phone)+'</div></div>'
          +'<div style="text-align:right"><span class="badge" style="background:'+sc+'22;color:'+sc+'">'+sl+'</span>'+dl+'</div>'
          +'</div></div>';
      }
      listHTML=items;
    }
  }

  var modals="";

  if(state.showForm){
    modals+='<div class="modal-overlay"><div class="modal">'
      +'<h2 style="font-size:18px">Add New Lead</h2>'
      +'<div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="f-name" placeholder="John Smith" value="'+state.form.name+'"></div>'
      +'<div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="f-phone" type="tel" placeholder="(555) 123-4567" value="'+state.form.phone+'"></div>'
      +'<div class="form-group"><label class="form-label">Estimate Date</label><input class="form-input" id="f-date" type="date" value="'+state.form.estimateDate+'"></div>'
      +'<div class="form-group"><label class="form-label">Lead Source</label>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="source-btn '+(state.form.source==="Facebook"?"active-fb":"inactive")+'" onclick="setState({form:Object.assign({},state.form,{source:\'Facebook\'})})">Facebook</button>'
      +'<button class="source-btn '+(state.form.source==="Google"?"active-g":"inactive")+'" onclick="setState({form:Object.assign({},state.form,{source:\'Google\'})})">Google</button>'
      +'</div></div>'
      +'<div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="f-notes" rows="2" placeholder="Any notes...">'+state.form.notes+'</textarea></div>'
      +'<div class="btn-row">'
      +'<button class="btn-cancel" onclick="setState({showForm:false})">Cancel</button>'
      +'<button class="btn-submit" style="background:#3B82F6" onclick="state.form.name=document.getElementById(\'f-name\').value;state.form.phone=document.getElementById(\'f-phone\').value;state.form.estimateDate=document.getElementById(\'f-date\').value;state.form.notes=document.getElementById(\'f-notes\').value;addLead()">Add Lead</button>'
      +'</div></div></div>';
  }

  if(state.showSettings){
    var textsHTML="";
    for(var i=0;i<8;i++){
      var phase=i<3?"Phase 1 \u2014 Push Estimate":"Phase 2 \u2014 Get Response";
      var escaped=state.texts[i].replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      textsHTML+='<div class="text-edit-card">'
        +'<div class="text-edit-num">Text #'+(i+1)+' \u00b7 Day '+CADENCE[i]+' \u00b7 '+phase+'</div>'
        +'<textarea class="text-edit-area" id="text-edit-'+i+'" rows="3">'+state.texts[i]+'</textarea>'
        +'</div>';
    }
    modals+='<div class="modal-overlay"><div class="modal" style="max-width:440px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<h2 style="font-size:18px;margin:0">Edit Text Messages</h2>'
      +'</div>'
      +'<p style="font-size:12px;color:#64748B;margin-bottom:16px">Type <span style="color:#60A5FA;font-weight:600">name</span> where you want the lead\'s first name to appear.</p>'
      +textsHTML
      +'<div style="display:flex;gap:8px;margin-top:4px">'
      +'<button style="padding:10px 14px;border-radius:8px;border:1px solid #EF4444;background:transparent;color:#EF4444;cursor:pointer;font-size:13px" onclick="resetTexts()">Reset</button>'
      +'<div style="flex:1"></div>'
      +'<button class="btn-cancel" style="flex:0" onclick="setState({showSettings:false})">Cancel</button>'
      +'<button class="btn-submit" style="background:#3B82F6;flex:0;padding:10px 20px" onclick="saveSettingsTexts()">Save</button>'
      +'</div></div></div>';
  }

  if(state.textMessage){
    var tm=state.textMessage;
    var smsHref="sms:"+tm.phone.replace(/\D/g,"")+"?body="+encodeURIComponent(tm.message);
    modals+='<div class="modal-overlay"><div class="modal" style="max-width:400px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<h3 style="font-size:16px;margin:0">\ud83d\udcf1 Text to '+tm.leadName+'</h3>'
      +'<span class="badge" style="background:#3B82F622;color:#60A5FA">#'+tm.stepNumber+' of 8</span></div>'
      +'<p style="font-size:12px;color:#64748B;margin-bottom:8px">'+fmtPhone(tm.phone)+'</p>'
      +'<div class="text-preview">'+tm.message+'</div>'
      +'<div class="btn-row">'
      +'<button class="btn-submit" style="background:'+(state.copied?"#10B981":"#334155")+'" onclick="copyText(state.textMessage.message)">'+(state.copied?"\u2713 Copied!":"\ud83d\udccb Copy Text")+'</button>'
      +'<a href="'+smsHref+'" class="sms-link">\ud83d\udcac Send Text</a>'
      +'</div>'
      +'<button style="width:100%;margin-top:8px;padding:10px;border-radius:8px;border:none;background:transparent;color:#64748B;cursor:pointer;font-size:13px" onclick="setState({textMessage:null})">Close</button>'
      +'</div></div>';
  }

  if(state.callbackLeadId){
    modals+='<div class="modal-overlay"><div class="modal" style="max-width:340px">'
      +'<h3 style="font-size:16px">Schedule Callback</h3>'
      +'<div class="form-group"><label class="form-label">Date *</label><input class="form-input" id="cb-date" type="date" value="'+state.callbackDate+'"></div>'
      +'<div class="form-group"><label class="form-label">Time (optional)</label><input class="form-input" id="cb-time" type="time" value="'+state.callbackTime+'"></div>'
      +'<div class="btn-row">'
      +'<button class="btn-cancel" onclick="setState({callbackLeadId:null,callbackDate:\'\',callbackTime:\'\'})">Cancel</button>'
      +'<button class="btn-submit" style="background:#8B5CF6" onclick="state.callbackDate=document.getElementById(\'cb-date\').value;state.callbackTime=document.getElementById(\'cb-time\').value;setCallback(state.callbackLeadId)">Set Callback</button>'
      +'</div></div></div>';
  }

  if(state.confirmAction){
    var ca=state.confirmAction;
    modals+='<div class="modal-overlay"><div class="modal" style="max-width:340px;text-align:center">'
      +'<p style="font-size:15px;margin-bottom:16px">'+ca.msg+'</p>'
      +'<div class="btn-row">'
      +'<button class="btn-cancel" onclick="setState({confirmAction:null})">Cancel</button>'
      +'<button class="btn-submit" style="background:'+ca.color+'" onclick="recordAction(\''+ca.id+'\',\''+ca.type+'\')">'+ca.label+'</button>'
      +'</div></div></div>';
  }

  if(state.editingLead){
    var el=state.editingLead;
    var dl=daysLeft(el.estimateDate);
    var logHTML="";
    if(el.actions.length===0){
      logHTML='<p style="font-size:13px;color:#475569">No actions yet</p>';
    } else {
      for(var i=0;i<el.actions.length;i++){
        var a=el.actions[i];
        var col=a.type==="no_answer"?"#F59E0B":a.type==="callback"?"#8B5CF6":a.type==="accepted"?"#10B981":"#EF4444";
        var txt=a.type==="no_answer"?"No Answer":a.type==="callback"?"Callback: "+new Date(a.callbackDate+"T12:00:00").toLocaleDateString()+(a.callbackTime?" at "+a.callbackTime:""):a.type==="accepted"?"Estimate Accepted \u2713":"Estimate Declined \u2717";
        logHTML+='<div class="log-item"><div class="log-dot" style="background:'+col+'"></div><div><div class="log-text">'+txt+'</div><div class="log-date">'+new Date(a.date).toLocaleString()+'</div></div></div>';
      }
    }
    modals+='<div class="modal-overlay" style="z-index:998"><div class="modal" style="max-width:420px">'
      +'<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">'
      +'<div><h3 style="font-size:18px;margin:0">'+el.name+'</h3><p style="font-size:13px;color:#94A3B8;margin-top:4px">'+fmtPhone(el.phone)+'</p></div>'
      +'<span class="badge" style="background:'+SRC_COLORS[el.source]+'22;color:'+SRC_COLORS[el.source]+'">'+el.source+'</span></div>'
      +'<div class="info-grid">'
      +'<div class="info-box"><div class="info-label">Estimate Date</div><div class="info-value">'+new Date(el.estimateDate+"T12:00:00").toLocaleDateString()+'</div></div>'
      +'<div class="info-box"><div class="info-label">Days Left</div><div class="info-value" style="color:'+(dl<=5?"#EF4444":"#E2E8F0")+'">'+Math.max(0,dl)+'</div></div></div>'
      +(el.notes?'<div style="background:#0F172A;border-radius:8px;padding:10px;margin-bottom:16px;font-size:13px;color:#94A3B8">'+el.notes+'</div>':"")
      +'<h4 style="font-size:13px;color:#64748B;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Activity Log</h4>'
      +'<div style="margin-bottom:16px">'+logHTML+'</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button style="padding:10px 16px;border-radius:8px;border:1px solid #EF4444;background:transparent;color:#EF4444;cursor:pointer;font-size:13px" onclick="deleteLead(\''+el.id+'\')">Delete</button>'
      +'<div style="flex:1"></div>'
      +'<button style="padding:10px 20px;border-radius:8px;border:none;background:#334155;color:#E2E8F0;cursor:pointer;font-size:13px" onclick="setState({editingLead:null})">Close</button>'
      +'</div></div></div>';
  }

  app.innerHTML=
    '<div class="header">'
    +'<div><h1>Lead Tracker</h1><span>'+active.length+' active lead'+(active.length!==1?"s":"")+'</span></div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<button class="btn-icon" onclick="setState({showSettings:true})" title="Settings">\u2699\ufe0f</button>'
    +'<button class="btn btn-outline" onclick="setState({view:state.view===\'calendar\'?\'list\':\'calendar\'})">'+(state.view==="calendar"?"\ud83d\udccb List":"\ud83d\udcc5 Calendar")+'</button>'
    +'<button class="btn btn-primary" onclick="setState({showForm:true})">+ Add Lead</button>'
    +'</div></div>'
    +'<div class="legend">'
    +'<div class="legend-item"><div class="legend-dot" style="background:#1877F2"></div>Facebook</div>'
    +'<div class="legend-item"><div class="legend-dot" style="background:#EA4335"></div>Google</div>'
    +'<div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div>Callback</div>'
    +'</div>'
    +(state.view==="calendar"?
    '<div class="content">'
    +'<div class="cal-nav">'
    +'<button onclick="setState({currentMonth:state.currentMonth.month===0?{year:state.currentMonth.year-1,month:11}:{year:state.currentMonth.year,month:state.currentMonth.month-1}})">\u2039</button>'
    +'<h2>'+MONTHS[month]+' '+year+'</h2>'
    +'<button onclick="setState({currentMonth:state.currentMonth.month===11?{year:state.currentMonth.year+1,month:0}:{year:state.currentMonth.year,month:state.currentMonth.month+1}})">\u203a</button>'
    +'</div>'
    +'<div class="cal-grid">'
    +'<div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div><div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>'
    +calDays+'</div>'
    +'<h3 class="section-title">'+selDateLabel+(selLeads.length?' <span class="section-sub">\u2014 '+selLeads.length+' follow-up'+(selLeads.length!==1?"s":"")+'</span>':"")+'</h3>'
    +selectedHTML+'</div>'
    :'<div class="content"><h3 class="section-title">All Leads ('+state.leads.length+')</h3>'+listHTML+'</div>')
    +modals;
}

render();
</script>
</body>
</html>

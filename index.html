function fmtPhone(p){var d=p.replace(/\D/g,"");if(d.length===10)return"("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);if(d.length===11)return"("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);return p;}

function extractColors(imgSrc,callback){
  var img=new Image();img.crossOrigin="anonymous";
  img.onload=function(){
    var c=document.createElement("canvas");c.width=50;c.height=50;
    var ctx=c.getContext("2d");ctx.drawImage(img,0,0,50,50);
    var data=ctx.getImageData(0,0,50,50).data;
    var buckets={};
    for(var i=0;i<data.length;i+=4){
      var r=Math.round(data[i]/32)*32,g=Math.round(data[i+1]/32)*32,b=Math.round(data[i+2]/32)*32;
      if(data[i+3]<128)continue;
      var key=r+","+g+","+b;
      if(!buckets[key])buckets[key]={r:data[i],g:data[i+1],b:data[i+2],count:0};
      buckets[key].count++;buckets[key].r=(buckets[key].r+data[i])/2;buckets[key].g=(buckets[key].g+data[i+1])/2;buckets[key].b=(buckets[key].b+data[i+2])/2;
    }
    var sorted=Object.values(buckets).sort(function(a,b){return b.count-a.count;});
    /* Pick 5 distinct colors */
    var colors=[];
    for(var i=0;i<sorted.length&&colors.length<5;i++){
      var s=sorted[i];var r=Math.round(s.r),g=Math.round(s.g),b=Math.round(s.b);
      var isDist=true;
      for(var j=0;j<colors.length;j++){
        var d=Math.abs(r-colors[j][0])+Math.abs(g-colors[j][1])+Math.abs(b-colors[j][2]);
        if(d<80){isDist=false;break;}
      }
      if(isDist)colors.push([r,g,b]);
    }
    while(colors.length<5)colors.push([59,130,246]);
    var hexColors=colors.map(function(c){return"#"+c.map(function(v){return Math.min(255,Math.max(0,v)).toString(16).padStart(2,"0");}).join("");});
    callback(hexColors);
  };
  img.onerror=function(){callback(["#3B82F6","#1877F2","#10B981","#8B5CF6","#F59E0B"]);};
  img.src=imgSrc;
}

function handleCSVFile(){var input=document.createElement("input");input.type="file";input.accept=".csv";input.onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){var text=ev.target.result;var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});if(lines.length<2)return;var headers=parseCSVLine(lines[0]);var rows=[];for(var i=1;i<lines.length;i++){var parts=parseCSVLine(lines[i]);if(parts.length>=2)rows.push(parts);}var nc=-1,fnc=-1,lnc=-1,pc=-1;for(var h=0;h<headers.length;h++){if(pc===-1&&isPhoneH(headers[h]))pc=h;if(nc===-1&&isNameH(headers[h]))nc=h;if(fnc===-1&&isFNameH(headers[h]))fnc=h;if(lnc===-1&&isLNameH(headers[h]))lnc=h;}var nameMode=(fnc!==-1)?"split":"full";if(nc===-1&&nameMode==="full")nc=0;if(fnc===-1)fnc=(headers.length>1?1:0);if(lnc===-1)lnc=(headers.length>2?2:0);setState({csvImport:{step:"mapping",headers:headers,rows:rows,nameMode:nameMode,nameCol:nc,fnameCol:fnc,lnameCol:lnc,phoneCol:pc,mode:"add",duplicates:[],clean:[]}});};reader.readAsText(file);};input.click();}

function buildCard(l,cfg){
  var ic=countInteractions(l.actions);
  var meta="";
  if(l.followUpType==="callback"&&l.callbackTime)meta='<div style="font-size:12px;color:#8B5CF6;margin-top:2px">\ud83d\udcde Callback at '+fmt12(l.callbackTime)+'</div>';
  else if(l.followUpType==="callback")meta='<div style="font-size:12px;color:#8B5CF6;margin-top:2px">\ud83d\udcde Scheduled Callback</div>';
  else if(l.followUpType==="call")meta='<div class="lead-meta">Follow-up #'+(ic+1)+' of '+cfg.followUps.length+' \u00b7 Day '+l.daysSince+'</div>';
  var sc=SRC_COLORS[l.source]||"#3B82F6";
  var ph=l.phone.replace(/\D/g,"");
  var nm=escA(l.name);
  var p=[];
  p.push('<div class="card">');
  p.push('<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">');
  p.push('<div onclick="setState({editingLead:state.leads.find(function(x){return x.id===\''+l.id+'\'}),editMode:false})" style="cursor:pointer">');
  p.push('<div class="lead-name">'+l.name+'</div>');
  p.push('<div class="lead-phone">'+fmtPhone(l.phone)+'</div>');
  p.push(meta);
  p.push('</div>');
  p.push('<span class="badge" style="background:'+sc+'22;color:'+sc+'">'+l.source+'</span>');
  p.push('</div>');
  p.push('<div class="actions">');
  p.push('<a href="tel:'+ph+'" class="action-call">\ud83d\udcde Call</a>');
  p.push('<button class="action-btn no-answer" onclick="handleNoAnswer(\''+l.id+'\')">No Answer</button>');
  p.push('<button class="action-btn callback" onclick="setState({callbackLeadId:\''+l.id+'\'})">Callback</button>');
  p.push('<button class="action-btn accepted" onclick="setState({confirmAction:{msg:\''+nm+' accepted?\',label:\'Accepted\',color:\'#10B981\',id:\''+l.id+'\',type:\'accepted\'}})">Accepted</button>');
  p.push('<button class="action-btn declined" onclick="setState({confirmAction:{msg:\''+nm+' declined?\',label:\'Declined\',color:\'#EF4444\',id:\''+l.id+'\',type:\'declined\'}})">Declined</button>');
  p.push('</div>');
  p.push('</div>');
  return p.join('');
}

  if(state.confirmAction){var ca2=state.confirmAction;modals+='<div class="modal-overlay"><div class="modal" style="max-width:340px;text-align:center"><p style="font-size:15px;margin-bottom:16px">'+ca2.msg+'</p><div class="btn-row"><button class="btn-cancel" onclick="setState({confirmAction:null})">Cancel</button><button class="btn-submit" style="background:'+ca2.color+'" onclick="recordAction(\''+ca2.id+'\',\''+ca2.type+'\')">'+ca2.label+'</button></div></div></div>';}

  /* Lead Detail */
  if(state.editingLead){var el=state.editingLead,dl=daysLeft(el.estimateDate,cfg.capDay);var logH="";if(!el.actions.length)logH='<p style="font-size:13px;color:var(--c-text5)">No actions yet</p>';else{for(var i=0;i<el.actions.length;i++){var a=el.actions[i];var col2=a.type==="no_answer"?"#F59E0B":a.type==="callback"?"#8B5CF6":a.type==="accepted"?"#10B981":"#EF4444";var txt=a.type==="no_answer"?"No Answer":a.type==="callback"?"Callback: "+new Date(a.callbackDate+"T12:00:00").toLocaleDateString()+(a.callbackTime?" at "+fmt12(a.callbackTime):""):a.type==="accepted"?"Accepted \u2713":"Declined \u2717";logH+='<div class="log-item"><div class="log-dot" style="background:'+col2+'"></div><div><div class="log-text">'+txt+'</div><div class="log-date">'+new Date(a.date).toLocaleString()+'</div></div></div>';}}var dt="";if(state.editMode){dt='<div style="margin-bottom:16px"><div class="form-group"><label class="form-label">Name</label><input class="form-input" id="edit-name" value="'+escA(el.name)+'"></div><div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="edit-phone" type="tel" value="'+escA(el.phone)+'"></div><div class="form-group"><label class="form-label">Lead Source</label><div style="display:flex;gap:8px"><button class="source-btn '+(el.source==="Facebook"?"active-fb":"inactive")+'" id="edit-src-fb" onclick="document.getElementById(\'edit-src-fb\').className=\'source-btn active-fb\';document.getElementById(\'edit-src-g\').className=\'source-btn inactive\'">Facebook</button><button class="source-btn '+(el.source==="Google"?"active-g":"inactive")+'" id="edit-src-g" onclick="document.getElementById(\'edit-src-g\').className=\'source-btn active-g\';document.getElementById(\'edit-src-fb\').className=\'source-btn inactive\'">Google</button></div></div><div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="edit-notes" rows="3">'+el.notes+'</textarea></div><div class="btn-row"><button class="btn-cancel" style="flex:0;padding:8px 16px" onclick="setState({editMode:false})">Cancel</button><button class="btn-submit" style="background:#10B981;flex:0;padding:8px 20px" onclick="saveLeadEdit()">\u2713 Save</button></div></div>';}else{dt='<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px"><div><h3 style="font-size:18px;margin:0">'+el.name+'</h3><p style="font-size:13px;color:var(--c-text3);margin-top:4px">'+fmtPhone(el.phone)+'</p></div><div style="display:flex;gap:6px;align-items:center"><button style="padding:5px 10px;border-radius:6px;border:1px solid var(--c-primary);background:transparent;color:var(--c-primary);cursor:pointer;font-size:12px;font-weight:600" onclick="setState({editMode:true})">Edit</button><span class="badge" style="background:'+SRC_COLORS[el.source]+'22;color:'+SRC_COLORS[el.source]+'">'+el.source+'</span></div></div>';}modals+='<div class="modal-overlay" style="z-index:998"><div class="modal" style="max-width:420px">'+dt+(!state.editMode?'<div class="info-grid"><div class="info-box"><div class="info-label">Estimate Date</div><div class="info-value">'+new Date(el.estimateDate+"T12:00:00").toLocaleDateString()+'</div></div><div class="info-box"><div class="info-label">Days Left</div><div class="info-value" style="color:'+(dl<=5?"#EF4444":"var(--c-text)")+'">'+Math.max(0,dl)+'</div></div></div>'+(el.notes?'<div style="background:var(--c-bg3);border-radius:8px;padding:10px;margin-bottom:16px;font-size:13px;color:var(--c-text3)">'+el.notes+'</div>':""):"")+'<h4 style="font-size:13px;color:var(--c-text4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Activity Log</h4><div style="margin-bottom:16px">'+logH+'</div><div style="display:flex;gap:8px"><button style="padding:10px 16px;border-radius:8px;border:1px solid #EF4444;background:transparent;color:#EF4444;cursor:pointer;font-size:13px" onclick="deleteLead(\''+el.id+'\')">Delete</button><div style="flex:1"></div><button style="padding:10px 20px;border-radius:8px;border:none;background:var(--c-border2);color:var(--c-text);cursor:pointer;font-size:13px" onclick="setState({editingLead:null,editMode:false})">Close</button></div></div></div>';}

  /* CSV Mapping */
  if(state.csvImport&&state.csvImport.step==="mapping"){var ci=state.csvImport;var hOpts="";for(var h=0;h<ci.headers.length;h++)hOpts+='<option value="'+h+'">'+escA(ci.headers[h])+'</option>';var nameMapHTML='<div style="margin-bottom:12px"><div style="font-size:13px;color:var(--c-text3);margin-bottom:6px">Name format:</div><div style="display:flex;gap:8px;margin-bottom:8px"><label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--c-text);cursor:pointer"><input type="radio" name="csv-name-mode" value="full"'+(ci.nameMode==="full"?' checked':'')+' onchange="csvNameModeChange(\'full\')" style="accent-color:var(--c-primary)"> Full Name</label><label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--c-text);cursor:pointer"><input type="radio" name="csv-name-mode" value="split"'+(ci.nameMode==="split"?' checked':'')+' onchange="csvNameModeChange(\'split\')" style="accent-color:var(--c-primary)"> First + Last</label></div>';if(ci.nameMode==="full"){var nOpts=hOpts.replace('value="'+ci.nameCol+'"','value="'+ci.nameCol+'" selected');nameMapHTML+='<div class="csv-map-row"><span class="csv-map-label">Name</span><select class="csv-map-select" id="csv-name-col" onchange="state.csvImport.nameCol=parseInt(this.value);renderCSVPreview()">'+nOpts+'</select></div>';}else{var fnOpts=hOpts.replace('value="'+ci.fnameCol+'"','value="'+ci.fnameCol+'" selected');var lnOpts=hOpts.replace('value="'+ci.lnameCol+'"','value="'+ci.lnameCol+'" selected');nameMapHTML+='<div class="csv-map-row"><span class="csv-map-label">First</span><select class="csv-map-select" id="csv-fname-col" onchange="state.csvImport.fnameCol=parseInt(this.value);renderCSVPreview()">'+fnOpts+'</select></div><div class="csv-map-row"><span class="csv-map-label">Last</span><select class="csv-map-select" id="csv-lname-col" onchange="state.csvImport.lnameCol=parseInt(this.value);renderCSVPreview()">'+lnOpts+'</select></div>';}nameMapHTML+='</div>';var pOpts='<option value="-1">(No phone column)</option>'+hOpts;if(ci.phoneCol>=0)pOpts=pOpts.replace('value="'+ci.phoneCol+'"','value="'+ci.phoneCol+'" selected');var prevH="";var show=ci.rows.slice(0,3);for(var i=0;i<show.length;i++){var r=show[i];prevH+="<tr><td>"+escA(csvGetName(r,ci))+"</td><td>"+(csvGetPhone(r,ci)?fmtPhone(csvGetPhone(r,ci)):"(none)")+"</td></tr>";}modals+='<div class="modal-overlay"><div class="modal" style="max-width:460px"><h2 style="font-size:18px">Import Contacts</h2><div style="margin-bottom:16px"><div class="settings-section-title">Map Columns</div>'+nameMapHTML+'<div class="csv-map-row"><span class="csv-map-label">Phone</span><select class="csv-map-select" id="csv-phone-col" onchange="state.csvImport.phoneCol=parseInt(this.value);renderCSVPreview()">'+pOpts+'</select></div></div><div class="settings-section-title">Preview</div><div class="csv-preview"><table><thead><tr><th>Name</th><th>Phone</th></tr></thead><tbody id="csv-preview-body">'+prevH+'</tbody></table></div><div class="settings-section-title" style="margin-top:16px">Import Mode</div><div class="csv-option'+(ci.mode==="replace"?" selected":"")+'"><input type="radio" name="csv-mode" value="replace"'+(ci.mode==="replace"?" checked":"")+' onchange="state.csvImport.mode=\'replace\'"><label>Replace all</label></div><div class="csv-option'+(ci.mode==="add"?" selected":"")+'"><input type="radio" name="csv-mode" value="add"'+(ci.mode==="add"?" checked":"")+' onchange="state.csvImport.mode=\'add\'"><label>Add to existing</label></div><div style="font-size:11px;color:var(--c-text4);margin:4px 0 12px">'+ci.rows.length+' contacts found</div><div class="btn-row"><button class="btn-cancel" onclick="setState({csvImport:null})">Cancel</button><button class="btn-submit" style="background:var(--c-primary)" onclick="csvProceedFromMapping()">Import</button></div></div></div>';}

  /* CSV Duplicates */
  if(state.csvImport&&state.csvImport.step==="duplicates"){var ci2=state.csvImport;var dupCards="";for(var i=0;i<ci2.duplicates.length;i++){var dp=ci2.duplicates[i];var isSkip=dp.action==="skip";dupCards+='<div class="dup-card"><div class="dup-info">'+escA(dp.csv.name)+' \u2014 '+fmtPhone(dp.csv.phone)+'</div><div class="dup-match">Matches: '+escA(dp.existing.name)+' \u2014 '+fmtPhone(dp.existing.phone)+'</div><div style="display:flex;gap:6px;margin-top:8px"><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(isSkip?'#F59E0B':'var(--c-border2)')+';background:'+(isSkip?'#F59E0B22':'transparent')+';color:'+(isSkip?'#F59E0B':'var(--c-text4)')+'" onclick="csvSetDupAction('+i+',\'skip\')">Skip</button><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(!isSkip?'var(--c-primary)':'var(--c-border2)')+';background:'+(!isSkip?'var(--c-primary-bg)':'transparent')+';color:'+(!isSkip?'var(--c-primary)':'var(--c-text4)')+'" onclick="csvSetDupAction('+i+',\'import\')">Import</button></div></div>';}modals+='<div class="modal-overlay"><div class="modal" style="max-width:460px"><h2 style="font-size:18px">'+ci2.duplicates.length+' Duplicate'+(ci2.duplicates.length>1?'s':'')+' Found</h2><div class="bulk-btns"><button class="bulk-btn" onclick="csvBulkDup(\'skip\')">Skip All</button><button class="bulk-btn" onclick="csvBulkDup(\'import\')">Import All</button></div>'+dupCards+'<div style="font-size:12px;color:var(--c-text4);margin:8px 0">'+ci2.clean.length+' non-duplicate'+(ci2.clean.length!==1?'s':'')+' will also be imported</div><div class="btn-row"><button class="btn-cancel" onclick="setState({csvImport:null})">Cancel</button><button class="btn-submit" style="background:var(--c-primary)" onclick="finishCSVImport()">Confirm</button></div></div></div>';}

  var tabBar='<div class="tab-bar"><button class="tab-btn'+(state.view==="calendar"?" active":"")+'" onclick="setState({view:\'calendar\'})">\ud83d\udcc5 Calendar</button><button class="tab-btn'+(state.view==="contacts"?" active":"")+'" onclick="setState({view:\'contacts\',contactSearch:\'\'})">\ud83d\udccb Contacts</button></div>';

  /* Header with logo */
  var headerLeft=state.logoBase64?'<img src="'+state.logoBase64+'" class="logo-img">':'<h1>Lead Tracker</h1>';

  var page='<div class="header"><div>'+headerLeft+'<span>'+active.length+' active lead'+(active.length!==1?"s":"")
    +' \u00b7 <button class="sign-out-btn" onclick="doSignOut()">Sign Out</button></span></div>'
    +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
    +'<button class="btn btn-outline" onclick="handleCSVFile()" style="padding:8px 10px;font-size:12px">\ud83d\udcc2 Import</button>'
    +'<button class="btn btn-outline" onclick="setState({showSettings:true,settingsTab:\'followups\'})" style="padding:8px 10px">Settings</button>'
    +'<button class="btn btn-primary" onclick="setState({showForm:true})">+ Lead</button>'
    +'<button class="btn btn-outline" onclick="setState({showAddContact:true})" style="padding:8px 10px">+ Contact</button></div></div>';
  page+=notifBanner+todayBanner+undoBar;
  page+='<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#1877F2"></div>Facebook</div><div class="legend-item"><div class="legend-dot" style="background:#EA4335"></div>Google</div><div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div>Callback</div></div>';
  page+=tabBar;
  if(state.view==="calendar"){
    page+='<div class="content">';
    page+='<div class="cal-nav"><button onclick="setState({currentMonth:state.currentMonth.month===0?{year:state.currentMonth.year-1,month:11}:{year:state.currentMonth.year,month:state.currentMonth.month-1}})">\u2039</button><h2>'+MONTHS[month]+' '+year+'</h2><button onclick="setState({currentMonth:state.currentMonth.month===11?{year:state.currentMonth.year+1,month:0}:{year:state.currentMonth.year,month:state.currentMonth.month+1}})">\u203a</button></div>';
    page+='<div class="cal-grid"><div class="cal-header">Sun</div><div class="cal-header">Mon</div><div class="cal-header">Tue</div><div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div>'+calDays+'</div>';
    page+='<h3 class="section-title">'+selDateLabel+(selLeads.length?' <span class="section-sub">\u2014 '+selLeads.length+' follow-up'+(selLeads.length!==1?"s":"")+'</span>':"")+'</h3>';
    page+=selectedHTML;
    page+='</div>';
  } else {
    page+='<div class="content">'+contactsHTML+'</div>';
  }
  page+=modals;
  app.innerHTML=page;
}

async function init(){
  if(!sb){document.getElementById("app").innerHTML='<div class="loading-wrap"><p style="color:#EF4444">Could not connect to database.</p></div>';return;}
  render();
  var{data:{session}}=await sb.auth.getSession();
  if(session){state.userId=session.user.id;state.userEmail=session.user.email;await loadAllData();}
  else{state.loading=false;render();}
  sb.auth.onAuthStateChange(async function(event,session){
    if(event==="SIGNED_IN"&&session&&state.userId!==session.user.id){state.userId=session.user.id;state.userEmail=session.user.email;await loadAllData();}
    else if(event==="SIGNED_OUT"){state.userId=null;state.userEmail=null;state.leads=[];state.contacts=[];state.config=JSON.parse(JSON.stringify(DEFAULT_CONFIG));state.logoBase64="";state.themeMode="dark";state.themeColors=[];state.loading=false;applyTheme();render();}
  });
}
init();
</script>

function getNextFU(lead,cfg){

  /* CSV Dups */
  if(S.csvImport&&S.csvImport.step==="duplicates"){var ci2=S.csvImport;var dpC="";for(var i=0;i<ci2.duplicates.length;i++){var dp=ci2.duplicates[i],isSk=dp.action==="skip";dpC+='<div class="dpc"><div style="font-size:13px;color:var(--tx)">'+ea(dp.csv.name)+' \u2014 '+fp(dp.csv.phone)+'</div><div style="font-size:12px;color:var(--c2);margin-top:4px">Match: '+ea(dp.existing.name)+'</div><div style="display:flex;gap:6px;margin-top:8px"><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(isSk?'var(--c2)':'var(--bd2)')+';color:'+(isSk?'var(--c2)':'var(--tx4)')+';background:transparent" onclick="csvDA('+i+',\'skip\')">Skip</button><button style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:1px solid '+(!isSk?'var(--c1)':'var(--bd2)')+';color:'+(!isSk?'var(--c1)':'var(--tx4)')+';background:transparent" onclick="csvDA('+i+',\'import\')">Import</button></div></div>';}modals+='<div class="mo"><div class="ml" style="max-width:460px"><h2 style="font-size:18px">'+ci2.duplicates.length+' Duplicate'+(ci2.duplicates.length>1?'s':'')+'</h2><div class="bbtn"><button class="bb" onclick="csvBk(\'skip\')">Skip All</button><button class="bb" onclick="csvBk(\'import\')">Import All</button></div>'+dpC+'<div class="br"><button class="bc" onclick="SS({csvImport:null})">Cancel</button><button class="bs" style="background:var(--c1)" onclick="csvFin()">Confirm</button></div></div></div>';}

/* Init */
async function init(){
  if(!sb){document.getElementById("app").innerHTML='<div class="lw"><p style="color:var(--c5)">Connection error</p></div>';return;}
  render();
  var{data:{session}}=await sb.auth.getSession();
  if(session){S.userId=session.user.id;S.userEmail=session.user.email;await loadAll();}
  else{S.loading=false;render();}
  sb.auth.onAuthStateChange(async function(ev,ses){
    if(ev==="SIGNED_IN"&&ses&&S.userId!==ses.user.id){S.userId=ses.user.id;S.userEmail=ses.user.email;await loadAll();}
    else if(ev==="SIGNED_OUT"){Object.assign(S,{userId:null,userEmail:null,leads:[],contacts:[],config:JSON.parse(JSON.stringify(DEF_CFG)),logoBase64:"",themeMode:"dark",themeColors:DC.slice(),loading:false});apT();render();}
  });
}
init();
</script>
